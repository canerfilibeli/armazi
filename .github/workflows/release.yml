name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build release binary
        run: swift build -c release --product armazi

      - name: Prepare artifact
        run: |
          cp .build/release/armazi armazi-macos-arm64
          shasum -a 256 armazi-macos-arm64 > checksums.txt
          cat checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            armazi-macos-arm64
            checksums.txt
          generate_release_notes: true
