name: Code Review & Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  security-events: write

jobs:
  build-and-test:
    name: Build & Validate
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Build all targets
        run: swift build

      - name: Build release
        run: swift build -c release --product armazi

  codeql:
    name: CodeQL Analysis
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: swift

      - name: Build for analysis
        run: swift build

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:swift"

  security-audit:
    name: Security Audit
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for potential secrets..."
          FOUND=0
          # Check for common secret patterns
          for pattern in "password\s*=" "secret\s*=" "api_key" "token\s*=" "private_key" "BEGIN RSA" "BEGIN OPENSSH"; do
            if grep -rni "$pattern" Sources/ --include="*.swift" | grep -v "// " | grep -v "help:" | grep -v "description:" | grep -v "\.password" | grep -v "askForPassword" | grep -v "SecureKeyboardEntry"; then
              echo "WARNING: Potential secret found for pattern: $pattern"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 0 ]; then
            echo "No hardcoded secrets found."
          fi

      - name: Check for unsafe shell execution patterns
        run: |
          echo "Checking shell execution patterns..."
          # Verify ShellExecutor is the only place running commands
          DIRECT_PROCESS=$(grep -rn "Process()" Sources/ --include="*.swift" | grep -v "ShellExecutor" | grep -v "ProcessInfo" || true)
          if [ -n "$DIRECT_PROCESS" ]; then
            echo "WARNING: Direct Process usage outside ShellExecutor:"
            echo "$DIRECT_PROCESS"
          else
            echo "All shell execution goes through ShellExecutor."
          fi

      - name: Check temp file security
        run: |
          echo "Checking temp file handling..."
          grep -rn "/tmp/" Sources/ --include="*.swift" || echo "No /tmp/ usage found outside expected paths"

      - name: Check for unsafe URL handling
        run: |
          echo "Checking URL construction..."
          grep -rn "URL(string:" Sources/ --include="*.swift" || echo "No dynamic URL construction found"

      - name: Validate benchmark YAML
        run: |
          echo "Validating embedded benchmark..."
          swift build --product armazi
          .build/debug/armazi list
