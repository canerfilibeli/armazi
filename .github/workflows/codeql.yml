name: CI & Security

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    name: Build & Validate
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Swift version
        run: swift --version

      - name: Build all targets
        run: swift build

      - name: Build release
        run: swift build -c release --product armazi

      - name: Validate benchmark
        run: .build/debug/armazi list

  security-audit:
    name: Security Audit
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Check for hardcoded secrets
        run: |
          echo "Scanning for potential secrets..."
          FOUND=0
          for pattern in "password\s*=" "secret\s*=" "api_key" "token\s*=" "private_key" "BEGIN RSA" "BEGIN OPENSSH"; do
            if grep -rni "$pattern" Sources/ --include="*.swift" | grep -v "// " | grep -v "help:" | grep -v "description:" | grep -v "\.password" | grep -v "askForPassword" | grep -v "SecureKeyboardEntry"; then
              echo "WARNING: Potential secret found for pattern: $pattern"
              FOUND=1
            fi
          done
          if [ "$FOUND" -eq 0 ]; then
            echo "No hardcoded secrets found."
          fi

      - name: Check shell execution patterns
        run: |
          echo "Checking shell execution patterns..."
          DIRECT_PROCESS=$(grep -rn "Process()" Sources/ --include="*.swift" | grep -v "ShellExecutor" | grep -v "ProcessInfo" || true)
          if [ -n "$DIRECT_PROCESS" ]; then
            echo "WARNING: Direct Process usage outside ShellExecutor:"
            echo "$DIRECT_PROCESS"
            exit 1
          else
            echo "All shell execution goes through ShellExecutor."
          fi

      - name: Check for /tmp usage
        run: |
          if grep -rn '"/tmp/' Sources/ --include="*.swift"; then
            echo "WARNING: Hardcoded /tmp paths found. Use FileManager.temporaryDirectory instead."
            exit 1
          else
            echo "No hardcoded /tmp paths."
          fi

      - name: Verify HTTPS enforcement
        run: |
          HTTP_URLS=$(grep -rn '"http://' Sources/ --include="*.swift" || true)
          if [ -n "$HTTP_URLS" ]; then
            echo "WARNING: Non-HTTPS URLs found:"
            echo "$HTTP_URLS"
            exit 1
          else
            echo "All URLs use HTTPS."
          fi
